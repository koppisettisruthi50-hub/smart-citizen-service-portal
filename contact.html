
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Smart Citizen Service Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header>
        <div class="logo">
            <h1>Smart Citizen Service Portal</h1>
        </div>

        <nav>
            <ul>
                <li><a href="index.html"> Home</a></li>
                <li><a href="certificates.html"> Certificates</a></li>
                <li><a href="schemes.html"> Schemes</a></li>
                <li><a href="faq.html"> FAQ</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html"> Contact</a></li>
            </ul>
        </nav>
        <button id="theme-toggle">🌙</button>
    </header>

    <!-- Contact Section -->
    <section class="services">
        <h2>Contact Us</h2>

        <div class="service-card">
            <form id="contactForm">

                <label for="name">Full Name</label><br>
                <input type="text" id="name" required><br><br>

                <label for="email">Email Address</label><br>
                <input type="email" id="email" required><br><br>

                <label for="message">Message</label><br>
                <textarea id="message" rows="5" required></textarea><br><br>

                <button type="submit">Send Message</button>

            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 Smart Citizen Service Portal. All Rights Reserved.</p>
    </footer>
<script>
    const toggleBtn = document.getElementById("theme-toggle");

toggleBtn.addEventListener("click", () => {
    document.body.classList.toggle("dark-mode");

    if (document.body.classList.contains("dark-mode")) {
        localStorage.setItem("theme", "dark");
        toggleBtn.textContent = "☀️";
    } else {
        localStorage.setItem("theme", "light");
        toggleBtn.textContent = "🌙";
    }
});

// Save user preference
if (localStorage.getItem("theme") === "dark") {
    document.body.classList.add("dark-mode");
    toggleBtn.textContent = "☀️";
}
</script>
    

</body>
</html>
